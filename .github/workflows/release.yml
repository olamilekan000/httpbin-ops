name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: false
      branch:
        description: 'Branch to release from'
        required: false
        default: 'main'
  pull_request:
    paths:
      - .github/workflows/release.yml
      - .goreleaser.yaml
      - Dockerfile.release.*
      - ci/

permissions:
  contents: write
  packages: write

jobs:
  validate:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: "1.25"

      - name: Run tests
        run: go test -v -race -cover ./...

      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run --timeout=5m ./...

      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt=json -out=gosec-report.json ./...
        continue-on-error: true

      - name: Set up Helm
        uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0

      - name: Lint Helm Chart
        run: helm lint httpbin-ops-charts

      - name: Upload gosec report
        if: always()
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b # v4.3.4
        with:
          name: gosec-report
          path: gosec-report.json
          if-no-files-found: ignore

  release:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: "1.25"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@5927c834f5b4fdf503fca6f4c7eccda82949e1ee # v3.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4fd812986e6c8c2a69e18311145f9371337f27d4 # v3.4.0

      - name: Install cross-compilation tools (for PR builds on host)
        if: github.event_name == 'pull_request'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          username: olamilekan001
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set LDFLAGS
        run: echo "LDFLAGS=$(make ldflags)" >> $GITHUB_ENV

      - name: Build RHEL 8 build image
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: docker build -f ci/Dockerfile.rhel8-build -t rhel8-goreleaser .

      - name: Prepare GPG key for package signing
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          NFPM_PASSPHRASE: ${{ secrets.NFPM_PASSPHRASE }}
        run: |
          mkdir -p "$RUNNER_TEMP/gpg"
          printf "%s" "$GPG_SIGNING_KEY" > "$RUNNER_TEMP/gpg/gpg.key"
          chmod 600 "$RUNNER_TEMP/gpg/gpg.key"
          if [ -s "$RUNNER_TEMP/gpg/gpg.key" ]; then echo "GPG key file created successfully"; else echo "GPG key file is EMPTY"; exit 1; fi
          if [ -n "$NFPM_PASSPHRASE" ]; then 
            echo "NFPM_PASSPHRASE is present (length: ${#NFPM_PASSPHRASE})"
          else 
            echo "NFPM_PASSPHRASE is EMPTY or NOT SET"
            exit 1
          fi

      - name: Run GoReleaser (release, RHEL 8–compatible RPMs)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -v "$RUNNER_TEMP/gpg:/tmp/gpg:ro" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$HOME/.docker:/root/.docker" \
            -w "/app" \
            -e GITHUB_TOKEN \
            -e GITHUB_REPOSITORY \
            -e NFPM_PASSPHRASE \
            -e NFPM_STATIC_PASSPHRASE \
            -e NFPM_DYNAMIC_PASSPHRASE \
            -e NFPM_FIPS_PASSPHRASE \
            -e GPG_PASSPHRASE \
            rhel8-goreleaser \
            sh -c 'ls -l /tmp/gpg/gpg.key && [ -n "$NFPM_PASSPHRASE" ] && echo "Passphrase seen in container" || echo "Passphrase NOT seen in container" && git config --global --add safe.directory /app && export LDFLAGS=$(make ldflags) && goreleaser release --clean'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          NFPM_PASSPHRASE: ${{ secrets.NFPM_PASSPHRASE }}
          NFPM_STATIC_PASSPHRASE: ${{ secrets.NFPM_PASSPHRASE }}
          NFPM_DYNAMIC_PASSPHRASE: ${{ secrets.NFPM_PASSPHRASE }}
          NFPM_FIPS_PASSPHRASE: ${{ secrets.NFPM_PASSPHRASE }}
          GPG_PASSPHRASE: ${{ secrets.NFPM_PASSPHRASE }}

      - name: "Smoke-test RPM: install and run on RHEL 8 / RHEL 9 / Fedora (amd64 & arm64)"
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && success()
        run: |
          set -e
          for arch in x86_64 aarch64; do
            for image in rockylinux:8 rockylinux:9 fedora:latest; do
              echo "=== Install and run dynamic RPM ($arch) on $image ==="
              docker run --rm --platform linux/$arch \
                -e ARCH=$arch \
                -v "${{ github.workspace }}/dist:/dist:ro" \
                "$image" \
                bash -c '
                  set -e
                  rpm=""
                  pattern="/dist/httpbin-dynamic*${ARCH}*.rpm"
                  if [ "$ARCH" = "x86_64" ]; then pattern="$pattern /dist/httpbin-dynamic*amd64*.rpm"; fi
                  if [ "$ARCH" = "aarch64" ]; then pattern="$pattern /dist/httpbin-dynamic*arm64*.rpm"; fi
                  
                  for f in $pattern; do [ -f "$f" ] && rpm="$f" && break; done
                  [ -n "$rpm" ] || { echo "No dynamic RPM found for $ARCH in /dist. Files present:"; ls /dist; exit 1; }
                  echo "Installing $rpm..."
                  rpm -ivh --nosignature "$rpm"
                  httpbin -version
                '
            done
          done

      - name: "Smoke-test DEB: install and run on Debian stable/oldstable (amd64 & arm64)"
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && success()
        run: |
          set -e
          for arch in amd64 arm64; do
            for image in debian:bullseye debian:bookworm; do
              echo "=== Install and run dynamic DEB ($arch) on $image ==="
              docker run --rm --platform linux/$arch \
                -e ARCH=$arch \
                -v "${{ github.workspace }}/dist:/dist:ro" \
                "$image" \
                bash -c '
                  apt-get update && apt-get install -y ./dist/httpbin-dynamic*_linux_${ARCH}.deb
                  httpbin -version
                '
            done
          done


      - name: Run GoReleaser
        if: github.event_name == 'pull_request'
        uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.1.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=sign
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b # v4.3.4
        with:
          name: release-artifacts
          path: dist/
          if-no-files-found: ignore
